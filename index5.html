<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Murid Baru - SPS Tunas Melati</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(180deg, #E3FDF5 0%, #FFE6FA 100%); 
            min-height: 100vh;
            color: #2F3640;
            padding-bottom: 50px;
        }

        /* Top Banner - Mengikuti desain screenshot sebelumnya */
        .top-banner {
            background: linear-gradient(90deg, #56ab2f 0%, #a8ff78 100%);
            padding: 15px 10px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .banner-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            padding: 6px 20px;
            border-radius: 50px;
            color: #FFF;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* Sticky Progress Bar Area */
        .progress-container {
            background: #FFF;
            padding: 15px 20px;
            margin: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .progress-text {
            font-weight: 700;
            font-size: 0.9rem;
            color: #4A5568;
            flex-shrink: 0;
        }
        .progress-text span {
            color: #1CB5E8;
            font-weight: 800;
        }
        .progress-bar-bg {
            background: #E2E8F0;
            height: 12px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #1CB5E8 0%, #73C045 100%);
            height: 100%;
            width: 0%; 
            transition: width 0.4s ease;
        }

        /* Main Form Sheet Card */
        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            margin: 0 15px 25px 15px;
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        /* HEADER SEKOLAH (Logo & Alamat Kembali!) */
        .form-header { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 2px dashed rgba(0,0,0,0.06); 
            padding-bottom: 20px; 
            margin-bottom: 25px; 
        }
        .school-logo { 
            width: 65px !important; 
            height: 65px !important; 
            object-fit: contain; 
            background: #FFF; 
            padding: 6px; 
            border-radius: 50%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .header-title h1 { 
            font-size: 1.25rem; 
            font-weight: 800; 
            color: #2F3640; 
            line-height: 1.2; 
        }
        .header-title p { 
            font-size: 0.85rem; 
            color: #64748B; 
            font-weight: 600; 
            margin-top: 4px; 
            line-height: 1.3;
        }

        /* Section Category Badges */
        .section-divider {
            font-size: 0.9rem;
            font-weight: 800;
            color: #FFF;
            background: linear-gradient(90deg, #1CB5E8, #73C045);
            padding: 6px 16px;
            border-radius: 50px;
            margin: 25px 0 15px 0;
            display: inline-block;
        }
        .section-divider:first-of-type { margin-top: 0; }

        /* Input Group Layout Mobile-Friendly */
        .input-group {
            margin-bottom: 16px;
            display: block; 
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #4A5568;
            margin-bottom: 6px;
        }
        .input-group label .req { color: #E63946; margin-left: 2px; }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1.5px solid #CBD5E1;
            border-radius: 12px;
            background: #FFF;
            color: #1A202C;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: #1CB5E8;
            background: #F8FAFC;
            box-shadow: 0 0 0 4px rgba(28, 181, 232, 0.1);
        }

        /* Baris Pendek Berdampingan (RT/RW / Tempat Tanggal Lahir) */
        .input-row {
            display: flex;
            gap: 12px;
        }
        .input-row .input-group { flex: 1; }

        /* Gender Radio Layout */
        .radio-box {
            display: flex;
            gap: 20px;
            padding: 8px 0;
        }
        .radio-lbl {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .radio-lbl input { width: 18px; height: 18px; accent-color: #1CB5E8; }

        /* Action Footer */
        .action-area {
            margin-top: 35px;
        }
        .btn-submit-form {
            width: 100%;
            padding: 15px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            color: #FFF;
            background: linear-gradient(90deg, #73C045 0%, #56ab2f 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(115,192,69,0.3);
            transition: transform 0.2s ease;
        }
        .btn-submit-form:active { transform: scale(0.98); }

        @media (max-width: 480px) {
            .form-header { flex-direction: column; text-align: center; }
            .input-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="top-banner">
        <div class="banner-tag">✨ Pendaftaran Tahun Ajaran 2026 / 2027</div>
    </div>

    <div class="progress-container">
        <div class="progress-text">Kelengkapan Formulir: <span id="percentText">0%</span></div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="form-card">
        
        <header class="form-header">
            <img src="assets/logo.png" alt="Logo Sekolah" class="school-logo" onerror="this.src='https://placehold.co/80x80/1cb5e8/ffffff?text=SPS'">
            <div class="header-title">
                <h1>SPS Tunas Melati</h1>
                <p>Muda, Kreatif, Berkarakter • RT 04 Dongkelan, Panggungharjo, Sewon, Bantul, DI Yogyakarta</p>
            </div>
        </header>

        <form id="mainPendaftaranForm">
            
            <div class="section-divider">👶 DATA CALON MURID</div>
            
            <div class="input-group">
                <label for="p_nama">Nama Lengkap Anak<span class="req">*</span></label>
                <input type="text" class="track-field" id="p_nama" required placeholder="Contoh: Muhammad Akhdan">
            </div>

            <div class="input-group">
                <label for="p_panggilan">Nama Panggilan<span class="req">*</span></label>
                <input type="text" class="track-field" id="p_panggilan" required placeholder="Contoh: Akhdan">
            </div>

            <div class="input-group">
                <label>Jenis Kelamin<span class="req">*</span></label>
                <div class="radio-box">
                    <label class="radio-lbl"><input type="radio" name="p_jk" value="Laki-laki" checked> Laki-laki</label>
                    <label class="radio-lbl"><input type="radio" name="p_jk" value="Perempuan"> Perempuan</label>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="p_nik">NIK Anak (KIA/KK)<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_nik" maxlength="16" required placeholder="16 digit NIK">
                </div>
                <div class="input-group">
                    <label for="p_kk">No. Kartu Keluarga (KK)<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_kk" maxlength="16" required placeholder="16 digit KK">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="p_tempat_lahir">Tempat Lahir<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_tempat_lahir" required placeholder="Kota Lahir">
                </div>
                <div class="input-group">
                    <label for="p_tanggal_lahir">Tanggal Lahir<span class="req">*</span></label>
                    <input type="date" class="track-field" id="p_tanggal_lahir" required>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="p_agama">Agama<span class="req">*</span></label>
                    <select class="track-field" id="p_agama" required>
                        <option value="">-- Pilih Agama --</option>
                        <option value="Islam">Islam</option>
                        <option value="Kristen">Kristen</option>
                        <option value="Katolik">Katolik</option>
                        <option value="Hindu">Hindu</option>
                        <option value="Buddha">Buddha</option>
                        <option value="Khonghucu">Khonghucu</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="p_anak_ke">Anak Ke-<span class="req">*</span></label>
                    <input type="number" class="track-field" id="p_anak_ke" min="1" required placeholder="0">
                </div>
                <div class="input-group">
                    <label for="p_saudara">Dari Jml Saudara<span class="req">*</span></label>
                    <input type="number" class="track-field" id="p_saudara" min="1" required placeholder="0">
                </div>
            </div>

            <div class="input-group">
                <label for="p_alamat">Alamat Jalan / Dusun / Kampung<span class="req">*</span></label>
                <textarea class="track-field" id="p_alamat" required rows="2" placeholder="Nama Dusun, Gang, No Rumah..."></textarea>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="p_rt">RT<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_rt" required placeholder="00">
                </div>
                <div class="input-group">
                    <label for="p_rw">RW<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_rw" required placeholder="00">
                </div>
                <div class="input-group">
                    <label for="p_desa">Kelurahan/Desa<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_desa" required placeholder="Desa">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="p_kec">Kecamatan<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_kec" required placeholder="Kecamatan">
                </div>
                <div class="input-group">
                    <label for="p_kota">Kabupaten/Kota<span class="req">*</span></label>
                    <input type="text" class="track-field" id="p_kota" required value="Bantul">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="p_goldar">Golongan Darah</label>
                    <select class="track-field" id="p_goldar">
                        <option value="Tidak Tahu">Tidak Tahu</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="AB">AB</option>
                        <option value="O">O</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="p_imunisasi">Riwayat Imunisasi Dasar</label>
                    <input type="text" class="track-field" id="p_imunisasi" placeholder="Misal: BCG, Polio, DPT, Lengkap">
                </div>
            </div>

            <div class="section-divider">👨 DATA AYAH KANDUNG</div>
            
            <div class="input-group">
                <label for="a_nama">Nama Lengkap Ayah<span class="req">*</span></label>
                <input type="text" class="track-field" id="a_nama" required placeholder="Nama bapak sesuai KTP">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="a_nik">NIK Ayah<span class="req">*</span></label>
                    <input type="text" class="track-field" id="a_nik" maxlength="16" required placeholder="16 digit NIK">
                </div>
                <div class="input-group">
                    <label for="a_hp">No. HP / WhatsApp Aktif<span class="req">*</span></label>
                    <input type="tel" class="track-field" id="a_hp" required placeholder="08xxxxxxxxxx">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="a_pekerjaan">Pekerjaan Utama<span class="req">*</span></label>
                    <input type="text" class="track-field" id="a_pekerjaan" required placeholder="Pekerjaan">
                </div>
                <div class="input-group">
                    <label for="a_penghasilan">Penghasilan Bulanan<span class="req">*</span></label>
                    <select class="track-field" id="a_penghasilan" required>
                        <option value="">-- Pilih Penghasilan --</option>
                        <option value="< Rp2.000.000">&lt; Rp2.000.000</option>
                        <option value="Rp2.000.000 - Rp5.000.000">Rp2.000.000 - Rp5.000.000</option>
                        <option value="Rp5.000.000 - Rp10.000.000">Rp5.000.000 - Rp10.000.000</option>
                        <option value="> Rp10.000.000">&gt; Rp10.000.000</option>
                    </select>
                </div>
            </div>

            <div class="section-divider">👩 DATA IBU KANDUNG</div>
            
            <div class="input-group">
                <label for="i_nama">Nama Lengkap Ibu<span class="req">*</span></label>
                <input type="text" class="track-field" id="i_nama" required placeholder="Nama ibu sesuai KTP">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="i_nik">NIK Ibu<span class="req">*</span></label>
                    <input type="text" class="track-field" id="i_nik" maxlength="16" required placeholder="16 digit NIK">
                </div>
                <div class="input-group">
                    <label for="i_hp">No. HP / WhatsApp Ibu</label>
                    <input type="tel" class="track-field" id="i_hp" placeholder="Boleh kosong jika sama dg Ayah">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="i_pekerjaan">Pekerjaan Ibu<span class="req">*</span></label>
                    <input type="text" class="track-field" id="i_pejaan" required placeholder="Pekerjaan / RT">
                </div>
                <div class="input-group">
                    <label for="i_penghasilan">Penghasilan Bulanan<span class="req">*</span></label>
                    <select class="track-field" id="i_penghasilan" required>
                        <option value="">-- Pilih Penghasilan --</option>
                        <option value="< Rp2.000.000">&lt; Rp2.000.000</option>
                        <option value="Rp2.000.000 - Rp5.000.000">Rp2.000.000 - Rp5.000.000</option>
                        <option value="Rp5.000.000 - Rp10.000.000">Rp5.000.000 - Rp10.000.000</option>
                        <option value="> Rp10.000.000">&gt; Rp10.000.000</option>
                    </select>
                </div>
            </div>

            <div class="action-area">
                <button type="submit" class="btn-submit-form">🚀 Kirim Formulir Sekarang</button>
            </div>

        </form>
    </div>

    <script src="appx.js"></script>
</body>
</html>
