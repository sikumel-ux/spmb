<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Autentikasi Admin - SPS Tunas Melati</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-hijau: #4CAF50;
            --primary-kuning: #F4C430;
            --text-color: #2F3640;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-card img { width: 70px; margin-bottom: 15px; }
        .login-card h2 { font-weight: 800; color: #1e293b; font-size: 1.4rem; margin-bottom: 5px; }
        .login-card p { color: #64748b; font-size: 0.85rem; margin-bottom: 30px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-group input { 
            width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; 
            outline: none; font-size: 0.9rem; transition: all 0.3s; 
        }
        .form-group input:focus { border-color: var(--primary-hijau); box-shadow: 0 0 0 4px rgba(76,175,80,0.12); }
        
        .btn-login { 
            width: 100%; background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%); color: white; 
            border: none; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(76,175,80,0.2); transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(76,175,80,0.3); }
        .btn-login:disabled { background: #b2bec3; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; margin-bottom: 20px; display: none; text-align: left; border-left: 4px solid #ef4444; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../logo_sps.png" alt="Logo">
        <h2>Sistem Administrasi</h2>
        <p>Silakan masuk menggunakan akun admin resmi</p>

        <div id="errorBox" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Admin</label>
                <input type="email" id="loginEmail" placeholder="contoh: admin@tunasmeliati.com" required>
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" id="btnLoginSubmit" class="btn-login">Masuk ke Panel</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyA1zxBRXwKGwj7Tz3Rcy3vWTtu9aQNKY84",
          authDomain: "tnsmelatidkl.firebaseapp.com",
          projectId: "tnsmelatidkl",
          storageBucket: "tnsmelatidkl.firebasestorage.app",
          messagingSenderId: "915178991722",
          appId: "1:915178991722:web:b465200ab481a5939e9a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById("loginForm");
        const btnSubmit = document.getElementById("btnLoginSubmit");
        const errorBox = document.getElementById("errorBox");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorBox.style.display = "none";
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Mengecek Sandi...";

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                // Tembak verifikasi ke Firebase Auth
                await signInWithEmailAndPassword(auth, email, password);
                
                // Jika sukses, lempar ke folder admin
                window.location.href = "../admin/";
            } catch (err) {
                console.error(err);
                errorBox.style.display = "block";
                
                // Terjemahan eror agar ramah dibaca admin
                if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
                    errorBox.innerText = "Email atau Kata Sandi salah! Periksa kembali.";
                } else {
                    errorBox.innerText = "Gagal login: " + err.message;
                }
                
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Masuk ke Panel";
            }
        });
    </script>
</body>
</html>
