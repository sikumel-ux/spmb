<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Autentikasi Admin - SPS Tunas Melati</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-hijau: #4CAF50;
            --primary-kuning: #F4C430;
            --text-color: #2F3640;
            --primary-merah: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            position: relative;
        }
        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            z-index: 10;
        }
        .login-card img { width: 70px; margin-bottom: 15px; }
        .login-card h2 { font-weight: 800; color: #1e293b; font-size: 1.4rem; margin-bottom: 5px; }
        .login-card p { color: #64748b; font-size: 0.85rem; margin-bottom: 30px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-group input { 
            width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; 
            outline: none; font-size: 0.9rem; transition: all 0.3s; 
        }
        .form-group input:focus { border-color: var(--primary-hijau); box-shadow: 0 0 0 4px rgba(76,175,80,0.12); }
        
        .btn-login { 
            width: 100%; background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%); color: white; 
            border: none; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(76,175,80,0.2); transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(76,175,80,0.3); }
        .btn-login:disabled { background: #b2bec3; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* ✨ CUSTOM TOAST NOTIFICATION FLOATING PANEL */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .custom-toast {
            background: white;
            color: #1e293b;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            min-width: 300px;
            border-left: 5px solid #cbd5e1;
            transform: translateX(120%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .custom-toast.show { transform: translateX(0); }
        .custom-toast.success { border-left-color: var(--primary-hijau); }
        .custom-toast.error { border-left-color: var(--primary-merah); }
        .custom-toast.info { border-left-color: #3b82f6; }
        .toast-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="login-card">
        <img src="../logo_sps.png" alt="Logo">
        <h2>Sistem Autentikasi</h2>
        <p>Silakan masuk menggunakan akun admin resmi</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Admin</label>
                <input type="email" id="loginEmail" placeholder="contoh: admin@tunasmelati.com" required>
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" id="btnLoginSubmit" class="btn-login">Masuk ke Panel</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔑 Konfigurasi Firebase Resmi Milikmu
        const firebaseConfig = {
          apiKey: "AIzaSyA1zxBRXwKGwj7Tz3Rcy3vWTtu9aQNKY84",
          authDomain: "tnsmelatidkl.firebaseapp.com",
          projectId: "tnsmelatidkl",
          storageBucket: "tnsmelatidkl.firebasestorage.app",
          messagingSenderId: "915178991722",
          appId: "1:915178991722:web:b465200ab481a5939e9a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById("loginForm");
        const btnSubmit = document.getElementById("btnLoginSubmit");
        const toastContainer = document.getElementById("toastContainer");

        // 🛠️ FUNGSI ENGINE RUNNING CUSTOM TOAST
        function showToast(message, type = "info") {
            const toast = document.createElement("div");
            toast.className = `custom-toast ${type}`;
            
            let icon = "ℹ️";
            if (type === "success") icon = "✅";
            if (type === "error") icon = "❌";

            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span>${message}</span>
            `;
            
            toastContainer.appendChild(toast);

            // Trigger transisi slide-in halus
            setTimeout(() => { toast.classList.add("show"); }, 50);

            // Hapus otomatis toast setelah 4 detik
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => { toast.remove(); }, 400);
            }, 4000);
        }

        // 🎛️ EVENT SUBMIT FORM ENGINE
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault(); // Menghentikan reload default browser
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Memproses Verifikasi...";
            showToast("Sedang mengecek akun di cloud server...", "info");

            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;

            try {
                // Proses autentikasi ke Firebase Auth
                await signInWithEmailAndPassword(auth, email, password);
                
                // Munculkan notifikasi sukses kustom
                showToast("Login Berhasil! Mengalihkan halaman...", "success");
                
                // Kasih jeda sedikit biar animasinya keliatan sebelum pindah folder admin
                setTimeout(() => {
                    window.location.href = "../admin/";
                }, 1500);

            } catch (err) {
                console.error("Firebase Login Error: ", err);
                
                // Terjemahan pesan eror agar mudah dipahami admin
                let errorUserMessage = "Gagal masuk: Terjadi kesalahan jaringan server.";
                if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
                    errorUserMessage = "Email atau Kata Sandi salah! Periksa kembali.";
                } else if (err.code === "auth/invalid-email") {
                    errorUserMessage = "Format penulisan email admin tidak valid.";
                } else if (err.code === "auth/too-many-requests") {
                    errorUserMessage = "Terlalu banyak percobaan gagal. Akun diblokir sementara.";
                }

                // Munculkan notifikasi error kustom
                showToast(errorUserMessage, "error");
                
                // Hidupkan kembali tombol login
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Masuk ke Panel";
            }
        });
    </script>
</body>
</html>
