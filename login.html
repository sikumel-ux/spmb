<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrator - SPMB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; padding: 20px; }
        .login-card { width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; }
        .login-logo { width: 90px; height: 90px; background: #fff; border-radius: 50%; margin: -85px auto 20px auto; padding: 4px; box-shadow: 0 10px 20px rgba(76,175,80,0.15); }
        .login-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .input-eye-wrapper { position: relative; display: flex; align-items: center; }
        .pass-toggle { position: absolute; right: 15px; background: none; border: none; cursor: pointer; color: #64748b; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo"><img src="assets/lingkaran.png" alt="Logo"></div>
        <h2 style="font-weight:700; margin-bottom:5px;">Admin Login</h2>
        <p style="font-size:0.85rem; color:#64748b; margin-bottom:30px;">SPS Tunas Melati Dongkelan</p>
        <form id="loginForm" style="text-align: left;">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Email Admin</label>
                <input type="email" id="email" required placeholder="admin@tunasmelati.com">
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label>Password</label>
                <div class="input-eye-wrapper">
                    <input type="password" id="password" style="width: 100%; padding-right: 45px;" required placeholder="••••••••">
                    <button type="button" id="togglePassword" class="pass-toggle">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Masuk Panel</button>
        </form>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
