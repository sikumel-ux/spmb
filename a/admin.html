<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Dashboard SPMB - SPS Tunas Melati</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-hijau: #4CAF50;
            --primary-kuning: #F4C430;
            --primary-merah: #e74c3c;
            --text-color: #2F3640;
            --bg-light: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-light); color: var(--text-color); padding: 30px 20px; }
        
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 20px; }
        .admin-header h1 { color: var(--primary-hijau); font-weight: 800; font-size: 1.8rem; }
        
        /* GRID STATISTIK CARD */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .card-stat { background: #ffffff; padding: 20px; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.01); display: flex; flex-direction: column; }
        .card-stat .title { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .card-stat .value { font-size: 1.8rem; font-weight: 800; color: #1e293b; }
        .card-stat.total { border-left: 5px solid #3b82f6; }
        .card-stat.cowok { border-left: 5px solid #06b6d4; }
        .card-stat.cewek { border-left: 5px solid #ec4899; }
        .card-stat.today { border-left: 5px solid var(--primary-kuning); }

        /* Table Styling */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th { background: #f1f5f9; color: #475569; padding: 16px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        td { padding: 16px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        tr:hover { background: #f8fafc; }
        
        /* Badges Status */
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; display: inline-block; }
        .badge.Pending { background: #fef3c7; color: #d97706; }
        .badge.Diterima { background: #dcfce7; color: #15803d; }
        .badge.Ditolak { background: #fee2e2; color: #b91c1c; }
        
        /* Action Buttons */
        .btn-action { padding: 8px 12px; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-right: 4px; color: white; }
        .btn-view { background: #3b82f6; }
        .btn-pdf { background: #8b5cf6; }
        .btn-approve { background: var(--primary-hijau); }
        .btn-reject { background: var(--primary-kuning); color: #7c2d12; }
        .btn-delete { background: var(--primary-merah); }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

        /* MODAL POPUP DETAIL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 800px; max-height: 85vh; border-radius: 16px; overflow-y: auto; padding: 30px; position: relative; animation: fadeIn 0.3s ease; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; font-weight: 700; color: #94a3b8; }
        
        .detail-section { margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 12px; border-left: 4px solid var(--primary-hijau); }
        .detail-section h3 { margin-bottom: 15px; color: #334155; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 20px; font-size: 0.9rem; }
        .detail-item span { font-weight: 600; color: #64748b; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* AREA PRINT CETAK PDF */
        #printArea { display: none; }

        @media print {
            body * { display: none !important; }
            #printArea, #printArea * { display: block !important; }
            #printArea { width: 100%; position: absolute; left: 0; top: 0; padding: 20px; background: white; color: black; }
            .print-header { text-align: center; border-bottom: 3px double #000; padding-bottom: 15px; margin-bottom: 30px; }
            .print-title { font-size: 1.6rem; font-weight: 800; text-transform: uppercase; }
            .print-section { margin-bottom: 25px; page-break-inside: avoid; }
            .print-section h3 { border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 15px; font-size: 1.1rem; text-transform: uppercase; }
            .print-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
            .print-table td { padding: 8px 5px; border: none; font-size: 1rem; vertical-align: top; }
            .print-table td.label { width: 30%; font-weight: bold; }
            .print-table td.titik { width: 3%; }
        }

        @media (max-width: 992px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 576px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>Dashboard Admin</h1>
                <p style="color: #64748b; font-size: 0.9rem;">Manajemen Real-time Sistem Penerimaan Murid Baru</p>
            </div>
            <button onclick="window.location.reload()" style="background: #e2e8f0; border:none; padding:10px 16px; border-radius:8px; font-weight:600; cursor:pointer;">🔄 Refresh</button>
        </div>

        <div class="stats-grid">
            <div class="card-stat total">
                <span class="title">Total Pendaftar</span>
                <span class="value" id="statTotal">0</span>
            </div>
            <div class="card-stat cowok">
                <span class="title">Laki-Laki (L)</span>
                <span class="value" id="statCowok">0</span>
            </div>
            <div class="card-stat cewek">
                <span class="title">Perempuan (P)</span>
                <span class="value" id="statCewek">0</span>
            </div>
            <div class="card-stat today">
                <span class="title">Daftar Hari Ini</span>
                <span class="value" id="statToday">0</span>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>No. Pendaftaran</th>
                        <th>Nama Anak</th>
                        <th>JK</th>
                        <th>Tanggal Daftar</th>
                        <th>Status</th>
                        <th>Aksi Pengelolaan</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #64748b;">Menghubungkan ke server cloud Firebase...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="btnCloseModal">&times;</span>
            <h2 style="margin-bottom: 25px; color: var(--primary-hijau); font-weight: 800;">Detail Lengkap Berkas</h2>
            <div id="modalDetailsContainer"></div>
        </div>
    </div>

    <div id="printArea"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyA1zxBRXwKGwj7Tz3Rcy3vWTtu9aQNKY84",
          authDomain: "tnsmelatidkl.firebaseapp.com",
          projectId: "tnsmelatidkl",
          storageBucket: "tnsmelatidkl.firebasestorage.app",
          messagingSenderId: "915178991722",
          appId: "1:915178991722:web:b465200ab481a5939e9a13"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const tableBody = document.getElementById("adminTableBody");
        const detailModal = document.getElementById("detailModal");
        const btnCloseModal = document.getElementById("btnCloseModal");
        const modalDetailsContainer = document.getElementById("modalDetailsContainer");

        let localDataCache = {}; 

        // 🟢 LISTEN DATA FIREBASE & HITUNG STATISTIK CARD
        onSnapshot(collection(db, "pendaftaran"), (snapshot) => {
            tableBody.innerHTML = "";
            localDataCache = {};

            let total = 0, cowok = 0, cewek = 0, hariIni = 0;
            const hariIniString = new Date().toDateString();

            if(snapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #64748b;">Belum ada data pendaftar yang masuk.</td></tr>`;
                updateCards(0, 0, 0, 0);
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                localDataCache[id] = data;

                // Hitung Statistik
                total++;
                const jk = data.anak?.jenisKelamin;
                if (jk === "Laki-laki") cowok++;
                else if (jk === "Perempuan") cewek++;

                if (data.createdAt) {
                    const dateObj = data.createdAt.toDate();
                    if (dateObj.toDateString() === hariIniString) hariIni++;
                }

                // Format Tanggal Display Tabel
                let tanggalMasuk = "-";
                if(data.createdAt) {
                    tanggalMasuk = data.createdAt.toDate().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                }

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight:700; color:#475569;">${data.nomorPendaftaran || '-'}</td>
                    <td><strong style="color:#1e293b;">${data.anak?.namaLengkap || '-'}</strong><br><small style="color:#64748b;">NIK: ${data.anak?.nik || '-'}</small></td>
                    <td><span style="font-weight:600">${jk === "Laki-laki" ? "L" : "P"}</span></td>
                    <td>${tanggalMasuk}</td>
                    <td><span class="badge ${data.status}">${data.status || 'Pending'}</span></td>
                    <td>
                        <button class="btn-action btn-view" data-id="${id}" title="Lihat">Buka</button>
                        <button class="btn-action btn-pdf" data-id="${id}" title="Simpan PDF">PDF</button>
                        <button class="btn-action btn-approve" data-id="${id}">✓</button>
                        <button class="btn-action btn-reject" data-id="${id}">✕</button>
                        <button class="btn-action btn-delete" data-id="${id}">Hapus</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            updateCards(total, cowok, cewek, hariIni);
            addTableActionListeners();
        });

        // Update teks nilai pada Card Atas
        function updateCards(total, cowok, cewek, today) {
            document.getElementById("statTotal").innerText = total;
            document.getElementById("statCowok").innerText = cowok;
            document.getElementById("statCewek").innerText = cewek;
            document.getElementById("statToday").innerText = today;
        }

        // ⚡ ACTION BUTTON HANDLER
        function addTableActionListeners() {
            // 1. Tombol Buka Pop-up
            document.querySelectorAll(".btn-view").forEach(btn => {
                btn.addEventListener("click", () => openDetailModal(btn.getAttribute("data-id")));
            });

            // 2. Tombol Download / Cetak PDF Resmi
            document.querySelectorAll(".btn-pdf").forEach(btn => {
                btn.addEventListener("click", () => generatePDF(btn.getAttribute("data-id")));
            });

            // 3. Tombol Terima Berkas
            document.querySelectorAll(".btn-approve").forEach(btn => {
                btn.addEventListener("click", async () => {
                    if(confirm("Terima berkas pendaftaran anak ini?")) {
                        await updateDoc(doc(db, "pendaftaran", btn.getAttribute("data-id")), { status: "Diterima" });
                    }
                });
            });

            // 4. Tombol Tolak Berkas
            document.querySelectorAll(".btn-reject").forEach(btn => {
                btn.addEventListener("click", async () => {
                    if(confirm("Tolak berkas pendaftaran anak ini?")) {
                        await updateDoc(doc(db, "pendaftaran", btn.getAttribute("data-id")), { status: "Ditolak" });
                    }
                });
            });

            // 5. Tombol Hapus Berkas Selamanya (Firebase)
            document.querySelectorAll(".btn-delete").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const id = btn.getAttribute("data-id");
                    const nama = localDataCache[id]?.anak?.namaLengkap || "Pendaftar";
                    if(confirm(`🚨 PERINGATAN!\nApakah Anda yakin ingin menghapus data berkas "${nama}" secara permanen dari server cloud?`)) {
                        await deleteDoc(doc(db, "pendaftaran", id));
                    }
                });
            });
        }

        // 👁️ DETAIL POPUP CONTROL
        function openDetailModal(id) {
            const data = localDataCache[id];
            if(!data) return;

            modalDetailsContainer.innerHTML = `
                <div class="detail-section">
                    <h3>I. Identitas Anak</h3>
                    <div class="detail-grid">
                        <div class="detail-item"><span>Nama Lengkap:</span> ${data.anak?.namaLengkap || '-'}</div>
                        <div class="detail-item"><span>Nama Panggilan:</span> ${data.anak?.namaPanggilan || '-'}</div>
                        <div class="detail-item"><span>NIK:</span> ${data.anak?.nik || '-'}</div>
                        <div class="detail-item"><span>No. KK:</span> ${data.anak?.noKk || '-'}</div>
                        <div class="detail-item"><span>TTL:</span> ${data.anak?.tempatLahir || '-'}, ${data.anak?.tanggalLahir || '-'}</div>
                        <div class="detail-item"><span>Jenis Kelamin:</span> ${data.anak?.jenisKelamin || '-'}</div>
                        <div class="detail-item"><span>Agama:</span> ${data.anak?.agama || '-'}</div>
                        <div class="detail-item" style="grid-column: span 2;"><span>Alamat:</span> ${data.anak?.alamat || '-'} RT ${data.anak?.rt || '-'}/RW ${data.anak?.rw || '-'}, Ds. ${data.anak?.desa || '-'}, Kec. ${data.anak?.kecamatan || '-'}</div>
                        <div class="detail-item"><span>Anak Ke / Saudara:</span> ${data.anak?.anakKe || '-'} / ${data.anak?.jumlahSaudara || '-'}</div>
                        <div class="detail-item"><span>Kondisi Kesehatan:</span> ${data.anak?.kondisiKesehatan || '-'}</div>
                    </div>
                </div>
                <div class="detail-section" style="border-left-color: var(--primary-kuning);">
                    <h3>II. Identitas Orang Tua</h3>
                    <div class="detail-grid">
                        <div class="detail-item"><span>Nama Ayah:</span> ${data.ayah?.nama || '-'}</div>
                        <div class="detail-item"><span>No. HP Ayah:</span> ${data.ayah?.hp || '-'}</div>
                        <div class="detail-item"><span>Nama Ibu:</span> ${data.ibu?.nama || '-'}</div>
                        <div class="detail-item"><span>No. HP Ibu:</span> ${data.ibu?.hp || '-'}</div>
                    </div>
                </div>
            `;
            detailModal.classList.add("show");
        }

        // 🖨️ FUNGSI GENERATE LEMBAR PRINT FORM MENJADI PDF
        function generatePDF(id) {
            const data = localDataCache[id];
            if(!data) return;

            const printArea = document.getElementById("printArea");
            let tglDaftar = data.createdAt ? data.createdAt.toDate().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) : '-';

            // Masukkan struktur laporan arsip resmi ke area print tersembunyi
            printArea.innerHTML = `
                <div class="print-header">
                    <div class="print-title">SPS TUNAS MELATI</div>
                    <div style="font-size: 0.9rem; margin-top: 4px;">FORMULIR PENDAFTARAN PESERTA DIDIK BARU resmi</div>
                    <div style="font-size: 0.85rem; font-style: italic; margin-top: 2px;">Nomor Pendaftaran: ${data.nomorPendaftaran || '-'}</div>
                </div>

                <div class="print-section">
                    <h3>I. IDENTITAS CALON PESERTA DIDIK</h3>
                    <table class="print-table">
                        <tr><td class="label">Nama Lengkap</td><td class="titik">:</td><td>${data.anak?.namaLengkap || '-'}</td></tr>
                        <tr><td class="label">Nama Panggilan</td><td class="titik">:</td><td>${data.anak?.namaPanggilan || '-'}</td></tr>
                        <tr><td class="label">Nomor Induk Kependudukan (NIK)</td><td class="titik">:</td><td>${data.anak?.nik || '-'}</td></tr>
                        <tr><td class="label">Nomor Kartu Keluarga (KK)</td><td class="titik">:</td><td>${data.anak?.noKk || '-'}</td></tr>
                        <tr><td class="label">Tempat, Tanggal Lahir</td><td class="titik">:</td><td>${data.anak?.tempatLahir || '-'}, ${data.anak?.tanggalLahir || '-'}</td></tr>
                        <tr><td class="label">Jenis Kelamin</td><td class="titik">:</td><td>${data.anak?.jenisKelamin || '-'}</td></tr>
                        <tr><td class="label">Agama</td><td class="titik">:</td><td>${data.anak?.agama || '-'}</td></tr>
                        <tr><td class="label">Anak Ke / Jumlah Saudara</td><td class="titik">:</td><td>${data.anak?.anakKe || '-'} dari ${data.anak?.jumlahSaudara || '-'} bersaudara</td></tr>
                        <tr><td class="label">Alamat Tinggal Rumah</td><td class="titik">:</td><td>${data.anak?.alamat || '-'} RT ${data.anak?.rt || '-'}/RW ${data.anak?.rw || '-'}, Desa ${data.anak?.desa || '-'}, Kec. ${data.anak?.kecamatan || '-'}, ${data.anak?.kabupaten || '-'}, ${data.anak?.provinsi || '-'}</td></tr>
                        <tr><td class="label">Golongan Darah / Imunisasi</td><td class="titik">:</td><td>${data.anak?.golDarah || '-'} / ${data.anak?.imunisasi || '-'}</td></tr>
                        <tr><td class="label">Riwayat Penyakit / Alergi</td><td class="titik">:</td><td>${data.anak?.alergi || 'Tidak Ada'}</td></tr>
                    </table>
                </div>

                <div class="print-section">
                    <h3>II. IDENTITAS ORANG TUA / WALI</h3>
                    <table class="print-table">
                        <tr><td class="label">Nama Lengkap Ayah</td><td class="titik">:</td><td>${data.ayah?.nama || '-'} (NIK: ${data.ayah?.nik || '-'})</td></tr>
                        <tr><td class="label">Pendidikan / Pekerjaan Ayah</td><td class="titik">:</td><td>${data.ayah?.pendidikan || '-'} / ${data.ayah?.pekerjaan || '-'}</td></tr>
                        <tr><td class="label">Nomor HP / WhatsApp Ayah</td><td class="titik">:</td><td>${data.ayah?.hp || '-'}</td></tr>
                        <tr style="border-top: 1px dashed #eee;"><td class="label">Nama Lengkap Ibu</td><td class="titik">:</td><td>${data.ibu?.nama || '-'} (NIK: ${data.ibu?.nik || '-'})</td></tr>
                        <tr><td class="label">Pendidikan / Pekerjaan Ibu</td><td class="titik">:</td><td>${data.ibu?.pendidikan || '-'} / ${data.ibu?.pekerjaan || '-'}</td></tr>
                        <tr><td class="label">Nomor HP / WhatsApp Ibu</td><td class="titik">:</td><td>${data.ibu?.hp || '-'}</td></tr>
                    </table>
                </div>

                <div class="print-section">
                    <h3>III. KONTAK KEADAAN DARURAT</h3>
                    <table class="print-table">
                        <tr><td class="label">Nama Orang Hubungan</td><td class="titik">:</td><td>${data.darurat?.nama || '-'} (${data.darurat?.hubungan || '-'})</td></tr>
                        <tr><td class="label">Nomor Telpon / HP</td><td class="titik">:</td><td>${data.darurat?.hp || '-'}</td></tr>
                    </table>
                </div>

                <div style="margin-top: 60px; float: right; text-align: center; width: 250px;">
                    <div>Yogyakarta, ${tglDaftar}</div>
                    <div style="margin-top: 70px; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 3px;">${data.ayah?.nama || data.ibu?.nama || 'Orang Tua / Wali'}</div>
                    <div style="font-size: 0.85rem; color: #555; margin-top: 3px;">Orang Tua / Wali Murid</div>
                </div>
            `;

            // Pemicu sistem cetak bawaan browser (User bisa ganti ke opsi "Save as PDF")
            window.print();
        }

        btnCloseModal.addEventListener("click", () => detailModal.classList.remove("show"));
        window.addEventListener("click", (e) => { if(e.target === detailModal) detailModal.classList.remove("show"); });
    </script>
</body>
</html>
