<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPMB TUNAS MELATI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Meta tag pendukung PWA -->
    <meta name="theme-color" content="#1A1714">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <main class="main-content">
        <form id="pwaForm" autocomplete="off">
            
            <!-- BAGIAN 1: DATA UTAMA -->
            <div class="form-card">
                <div class="card-header">
                    <div class="card-icon">01</div>
                    <h2>Data Utama Siswa</h2>
                </div>
                
                <div class="form-grid">
                    <div class="form-group span-6">
                        <label for="nikSiswa">NIK Siswa</label>
                        <input type="number" id="nikSiswa" placeholder="3404...">
                    </div>
                    <div class="form-group span-6">
                        <label for="noKk">No. Kartu Keluarga</label>
                        <input type="number" id="noKk" placeholder="3404...">
                    </div>
                    <div class="form-group span-12">
                        <label for="namaSiswa">Nama Lengkap Siswa</label>
                        <input type="text" id="namaSiswa" placeholder="Nama sesuai ijazah/akta">
                    </div>
                    <div class="form-group span-6">
                        <label for="tempatLahir">Tempat Lahir</label>
                        <input type="text" id="tempatLahir" placeholder="Kota/Kabupaten">
                    </div>
                    <div class="form-group span-6">
                        <label for="tglLahir">Tanggal Lahir</label>
                        <input type="date" id="tglLahir">
                    </div>
                    <div class="form-group span-6">
                        <label for="gender">Jenis Kelamin</label>
                        <select id="gender">
                            <option value="">Pilih...</option>
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                        </select>
                    </div>
                    <div class="form-group span-6">
                        <label for="agama">Agama</label>
                        <select id="agama">
                            <option value="">Pilih...</option>
                            <option value="Islam">Islam</option>
                            <option value="Kristen">Kristen</option>
                            <option value="Katolik">Katolik</option>
                            <option value="Hindu">Hindu</option>
                            <option value="Budha">Budha</option>
                            <option value="Konghucu">Konghucu</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- BAGIAN 2: ALAMAT & KONTAK -->
            <div class="form-card">
                <div class="card-header">
                    <div class="card-icon">02</div>
                    <h2>Alamat & Kontak</h2>
                </div>
                
                <div class="form-grid">
                    <div class="form-group span-12">
                        <label for="alamatSiswa">Alamat Jalan / Dusun</label>
                        <input type="text" id="alamatSiswa" placeholder="Nama jalan, nomor rumah, rt/rw">
                    </div>
                    <div class="form-group span-3">
                        <label for="rtSiswa">RT</label>
                        <input type="number" id="rtSiswa" placeholder="000">
                    </div>
                    <div class="form-group span-3">
                        <label for="rwSiswa">RW</label>
                        <input type="number" id="rwSiswa" placeholder="000">
                    </div>
                    <div class="form-group span-6">
                        <label for="noHp">No. Handphone (WhatsApp)</label>
                        <input type="tel" id="noHp" placeholder="08...">
                    </div>
                    <div class="form-group span-4">
                        <label for="anakKe">Anak Ke-</label>
                        <input type="number" id="anakKe" placeholder="1">
                    </div>
                    <div class="form-group span-4">
                        <label for="jmlSaudara">Jml. Saudara</label>
                        <input type="number" id="jmlSaudara" placeholder="0">
                    </div>
                    <div class="form-group span-4">
                        <label for="imunisasi">Status Imunisasi</label>
                        <select id="imunisasi">
                            <option value="Lengkap">Lengkap</option>
                            <option value="Belum Lengkap">Belum Lengkap</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- BAGIAN 3: DATA ORANG TUA -->
            <div class="form-card">
                <div class="card-header">
                    <div class="card-icon">03</div>
                    <h2>Data Orang Tua</h2>
                </div>
                
                <div class="form-grid">
                    <div class="form-group span-6">
                        <label for="namaAyah">Nama Lengkap Ayah</label>
                        <input type="text" id="namaAyah" placeholder="Nama ayah kandung">
                    </div>
                    <div class="form-group span-6">
                        <label for="pekerjaanAyah">Pekerjaan Ayah</label>
                        <input type="text" id="pekerjaanAyah" placeholder="Pekerjaan">
                    </div>
                    <div class="form-group span-6">
                        <label for="namaIbu">Nama Lengkap Ibu</label>
                        <input type="text" id="namaIbu" placeholder="Nama ibu kandung">
                    </div>
                    <div class="form-group span-6">
                        <label for="pekerjaanIbu">Pekerjaan Ibu</label>
                        <input type="text" id="pekerjaanIbu" placeholder="Pekerjaan">
                    </div>
                </div>
            </div>

            <!-- TOMBOL AKSI -->
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('pwaForm').reset()">Reset Form</button>
                <button type="submit" class="btn btn-primary">Simpan Data</button>
            </div>

        </form>
    </main>
</body>
</html>
