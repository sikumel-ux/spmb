<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Murid Baru - SPS Tunas Melati</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- PEMANGGILAN CSS BARU -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-banner">
        <img src="logo-sps.png" alt="Logo SPS Tunas Melati" class="header-logo" onerror="this.style.display='none'">
        <h1>SPS Tunas Melati</h1>
        <p>Formulir Pendaftaran Murid Baru TA 2026/2027 • Dongkelan RT 04</p>
    </div>

    <div class="form-container">
        <div class="progress-wrapper">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="percentText" class="progress-status">0%</div>

        <form id="mainPendaftaranForm">
            <div class="section-title">A. Data Calon Siswa</div>
            
            <div class="form-group">
                <label>Nama Lengkap Anak *</label>
                <input type="text" id="p_nama" class="track-field" required placeholder="Sesuai Akta Kelahiran">
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>Nama Panggilan *</label>
                    <input type="text" id="p_panggilan" class="track-field" required placeholder="Nama sapaan">
                </div>
                <div>
                    <label>Jenis Kelamin *</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="p_jk" value="Laki-laki" checked> Laki-laki</label>
                        <label class="radio-label"><input type="radio" name="p_jk" value="Perempuan"> Perempuan</label>
                    </div>
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>NIK Anak *</label>
                    <input type="number" id="p_nik" class="track-field" required placeholder="16 digit nomor NIK">
                </div>
                <div>
                    <label>No. Kartu Keluarga *</label>
                    <input type="number" id="p_kk" class="track-field" required placeholder="16 digit nomor KK">
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>Tempat Lahir *</label>
                    <input type="text" id="p_tempat_lahir" class="track-field" required placeholder="Kota lahir">
                </div>
                <div>
                    <label>Tanggal Lahir *</label>
                    <input type="date" id="p_tanggal_lahir" class="track-field" required>
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>Agama *</label>
                    <select id="p_agama" class="track-field" required>
                        <option value="Islam">Islam</option>
                        <option value="Kristen">Kristen</option>
                        <option value="Katolik">Katolik</option>
                        <option value="Hindu">Hindu</option>
                        <option value="Budha">Budha</option>
                        <option value="Konghucu">Konghucu</option>
                    </select>
                </div>
                <div>
                    <label>Golongan Darah</label>
                    <select id="p_goldar" class="track-field">
                        <option value="">Tidak Tahu</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="AB">AB</option>
                        <option value="O">O</option>
                    </select>
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>Anak Ke- *</label>
                    <input type="number" id="p_anak_ke" class="track-field" required min="1" value="1">
                </div>
                <div>
                    <label>Jumlah Saudara Kandung *</label>
                    <input type="number" id="p_saudara" class="track-field" required min="0" value="0">
                </div>
            </div>

            <div class="form-group">
                <label>Alamat Jalan/Kampung *</label>
                <textarea id="p_alamat" class="track-field" required rows="2" placeholder="Nama Jalan, Kampung, RT/RW"></textarea>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>RT *</label>
                    <input type="text" id="p_rt" class="track-field" required placeholder="04">
                </div>
                <div>
                    <label>RW *</label>
                    <input type="text" id="p_rw" class="track-field" required placeholder="00">
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>Desa/Kelurahan *</label>
                    <input type="text" id="p_desa" class="track-field" required value="Panggungharjo">
                </div>
                <div>
                    <label>Kecamatan *</label>
                    <input type="text" id="p_kec" class="track-field" required value="Sewon">
                </div>
            </div>

            <div class="form-group">
                <label>Kabupaten/Kota *</label>
                <input type="text" id="p_kota" class="track-field" required value="Bantul">
            </div>

            <div class="form-group">
                <label>Riwayat Imunisasi Anak</label>
                <input type="text" id="p_imunisasi" class="track-field" placeholder="Misal: BCG, Polio, DPT, Campak">
            </div>

            <div class="section-title">B. Data Orang Tua / Wali</div>
            
            <div class="form-group row-flex">
                <div>
                    <label>Nama Lengkap Ayah *</label>
                    <input type="text" id="a_nama" class="track-field" required>
                </div>
                <div>
                    <label>NIK Ayah *</label>
                    <input type="number" id="a_nik" class="track-field" required>
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>No. HP / WA Ayah *</label>
                    <input type="number" id="a_hp" class="track-field" required placeholder="08xxxxxxxxxx">
                </div>
                <div>
                    <label>Pekerjaan Ayah *</label>
                    <input type="text" id="a_pekerjaan" class="track-field" required placeholder="Swasta, Buruh, dll">
                </div>
            </div>

            <div class="form-group">
                <label>Penghasilan Ayah per Bulan *</label>
                <select id="a_penghasilan" class="track-field" required>
                    <option value="Di bawah Rp 1.000.000">Di bawah Rp 1.000.000</option>
                    <option value="Rp 1.000.000 - Rp 2.500.000">Rp 1.000.000 - Rp 2.500.000</option>
                    <option value="Rp 2.500.000 - Rp 5.000.000">Rp 2.500.000 - Rp 5.000.000</option>
                    <option value="Di atas Rp 5.000.000">Di atas Rp 5.000.000</option>
                </select>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>Nama Lengkap Ibu *</label>
                    <input type="text" id="i_nama" class="track-field" required>
                </div>
                <div>
                    <label>NIK Ibu *</label>
                    <input type="number" id="i_nik" class="track-field" required>
                </div>
            </div>

            <div class="form-group row-flex">
                <div>
                    <label>No. HP / WA Ibu</label>
                    <input type="number" id="i_hp" class="track-field" placeholder="Kosongkan jika sama dengan Ayah">
                </div>
                <div>
                    <label>Pekerjaan Ibu *</label>
                    <input type="text" id="i_pejaan" class="track-field" required placeholder="IRT, Swasta, dll">
                </div>
            </div>

            <div class="form-group">
                <label>Penghasilan Ibu per Bulan *</label>
                <select id="i_penghasilan" class="track-field" required>
                    <option value="Rp 0 (Tidak Berpenghasilan)">Rp 0 (Tidak Berpenghasilan)</option>
                    <option value="Di bawah Rp 1.000.000">Di bawah Rp 1.000.000</option>
                    <option value="Rp 1.000.000 - Rp 2.500.000">Rp 1.000.000 - Rp 2.500.000</option>
                    <option value="Di atas Rp 2.500.000">Di atas Rp 2.500.000</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">🚀 Kirim Formulir Sekarang</button>
        </form>
    </div>

    <div id="customAlert" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div id="alertIcon" class="alert-icon"></div>
            <div id="alertTitle" class="alert-title"></div>
            <div id="alertMessage" class="alert-message"></div>
            <button id="alertBtnClose" class="btn-alert-close">Selesai</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
